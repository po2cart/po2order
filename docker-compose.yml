version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: po2order-postgres
    environment:
      POSTGRES_USER: po2order
      POSTGRES_PASSWORD: po2order_dev
      POSTGRES_DB: po2order
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U po2order"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: po2order-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
